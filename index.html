function isValidEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function Nav({ page, setPage }) {
  const [open, setOpen] = useState(false);
  const links = [
    { label:'Начало', key:'home' },
    { label:'За нас', key:'about' },
    { label:'Галерия', key:'gallery' },
    { label:'Контакти', key:'contact' },
  ];
  function go(p) { setPage(p); setOpen(false); window.scrollTo(0,0); }
  return (
    <>
      <nav>
        <div className="nav-logo" onClick={() => go('home')}>AUTO <span>SALON</span> BG</div>
        <ul className="nav-links">
          {links.map(l => (
            <li key={l.key}>
              <a href="#" className={page === l.key ? 'active' : ''} onClick={e => { e.preventDefault(); go(l.key); }}>
                {l.label}
              </a>
            </li>
          ))}
        </ul>
        <button className="hamburger" onClick={() => setOpen(true)} aria-label="Menu">
          <span/><span/><span/>
        </button>
      </nav>
      <div className={'mobile-menu' + (open ? ' open' : '')}>
        <button className="mobile-close" onClick={() => setOpen(false)}>✕</button>
        {links.map(l => (
          <a key={l.key} href="#" onClick={e => { e.preventDefault(); go(l.key); }}>{l.label}</a>
        ))}
      </div>
    </>
  );
}

function AnimatedSection({ children }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.2 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} className={'sec-head-animate' + (visible ? ' visible' : '')}>
      {children}
    </div>
  );
}

function AnimatedCard({ children, delay, onClick }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setTimeout(() => setVisible(true), delay);
        obs.disconnect();
      }
    }, { threshold: 0.15 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [delay]);
  return (
    <div ref={ref} className={'card card-animate' + (visible ? ' visible' : '')} onClick={onClick}>
      {children}
    </div>
  );
}

function Home({ goBook }) {
  return (
    <div className="page">
      <div className="hero">
        <div className="hero-inner">
          <h2>Автокозметичен Център<br/><span>Auto Salon BG</span></h2>
          <p>Специално внимание на вашия автомобил</p>
          <button className="btn" onClick={() => goBook()}>
            <div className="btn-fill"></div>
            <span className="btn-text">Запиши час сега</span>
          </button>
        </div>
        <div className="scroll-indicator" onClick={() => window.scrollTo({top: window.innerHeight, behavior:'smooth'})}>
          <span>Scroll</span>
          <div className="scroll-arrow"></div>
        </div>
      </div>
      <div className="services-section">
        <AnimatedSection>
          <div className="sec-head">
            <h2>Услуги</h2>
            <p>Видове измиване и обработка</p>
            <div className="sec-div"/>

        </AnimatedSection>
        <div className="cards">
          {SERVICES.map((s, i) => (

              <div className="prices">{s.prices.map((p,j) => <div key={j}>{p}</div>)}</div>
              <div className="dur">⏱ {s.dur}</div>
              {s.inc && <div className="inc">✦ {s.inc}</div>}
            </AnimatedCard>
          ))}
        </div>
      </div>
    </div>
  );
}

function AnimatedPillar({ children, delay }) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) {
        setTimeout(() => setVisible(true), delay);
        obs.disconnect();
      }
    }, { threshold: 0.2 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [delay]);
  return (
    <div ref={ref} className={'pillar pillar-animate' + (visible ? ' visible' : '')}>
      {children}
    </div>
  );
}

  return (

function useScrollAnim(cls) {
  const ref = React.useRef(null);
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.15 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, cls + (visible ? ' visible' : '')];
}

function Gallery() {
  const [idx, setIdx] = useState(0);
  const [slideRef, slideCls] = useScrollAnim('gallery-anim');
  const [thumbRef, thumbCls] = useScrollAnim('gallery-anim');
  const [videoRef, videoCls] = useScrollAnim('gallery-anim');

  React.useEffect(() => {
    const t = setInterval(() => setIdx(i => (i + 1) % SLIDES.length), 4000);
    return () => clearInterval(t);
  }, []);
  const prev = () => setIdx(i => (i - 1 + SLIDES.length) % SLIDES.length);
  const next = () => setIdx(i => (i + 1) % SLIDES.length);
  return (
    <div className="page" style={{animation:'fadeIn 0.6s ease'}}>
      <div className="gallery-hero"><h2>Галерия</h2></div>
      <div className="slideshow">
        <div ref={slideRef} className={slideCls} style={{transitionDelay:'0.1s'}}>
          <div className="slide-main">
            <img src={SLIDES[idx]} alt={'Снимка ' + (idx+1)} key={idx} />
            <button className="slide-arr prev" onClick={prev}>&#8249;</button>
            <button className="slide-arr next" onClick={next}>&#8250;</button>
          </div>
        </div>
        <div ref={thumbRef} className={thumbCls} style={{transitionDelay:'0.3s'}}>
          <div className="slide-thumbs">
            {SLIDES.map((src,i) => (
              <div key={i} className={'slide-thumb' + (i===idx?' active':'')} onClick={() => setIdx(i)}>
                <img src={src} alt={'Миниатюра ' + (i+1)} />
              </div>
            ))}
          </div>
        </div>
      </div>
      <div ref={videoRef} className={videoCls} style={{transitionDelay:'0.2s'}}>
        <div className="video-sec">
          <h3>Вижте ни в действие</h3>
          <div className="video-wrap">
            <iframe src="https://www.youtube.com/embed/FWcr6TgLPFA" allowFullScreen title="Auto Salon Video"/>
          </div>
        </div>
      </div>
    </div>
  );
}

function ServiceSelect({ selected, onChange }) {
  const [open, setOpen] = useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    function onDocClick(e) {
      if (ref.current && !ref.current.contains(e.target)) setOpen(false);
    }
    document.addEventListener('mousedown', onDocClick);
    return () => document.removeEventListener('mousedown', onDocClick);
  }, []);
  function toggle(title) {
    if (selected.includes(title)) onChange(selected.filter(s => s !== title));
    else onChange([...selected, title]);
  }
  function remove(title, e) {
    e.stopPropagation();
    onChange(selected.filter(s => s !== title));
  }
  return (
    <div className={'multiselect' + (open ? ' open' : '')} ref={ref}>
      <button type="button" className="multiselect-trigger" onClick={() => setOpen(o => !o)}>
        {selected.length === 0 ? (
          <span className="multiselect-placeholder">Избери услуга...</span>
        ) : (
          <div className="multiselect-chips">
            {selected.map(title => (
              <span className="chip" key={title}>
                {title}
                <i className="fas fa-times chip-x" onClick={e => remove(title, e)} />
              </span>
            ))}
          </div>
        )}
        <i className={'fas fa-chevron-down multiselect-arrow' + (open ? ' open' : '')}/>
      </button>
      {open && (
        <div className="multiselect-panel">
          {SERVICES.map((s, i) => {
            const checked = selected.includes(s.title);
            return (
              <label key={s.title} className={'multiselect-option' + (checked ? ' checked' : '')} style={{animationDelay: (i * 35) + 'ms'}}>
                <span className="ms-checkbox">
                  <input type="checkbox" checked={checked} onChange={() => toggle(s.title)} />
                  <i className="fas fa-check"/>
                </span>
                <span className="ms-label">{s.title}</span>
              </label>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Book({ setPage, preselect }) {
  const [f, setF] = useState({ firstName:'', lastName:'', plate:'', email:'', phone:'', services: preselect ? [preselect] : [] });
  const [sent, setSent] = useState(false);
  const upd = (k, v) => setF(prev => ({ ...prev, [k]:v }));
  function submit() {
    if (!f.firstName || !f.email || f.services.length === 0) {
      alert('Моля попълнете задължителните полета (Име, Email, Услуга).');
      return;
    }
    if (!isValidEmail(f.email)) {
      alert('Моля въведете валиден Email адрес.');
      return;
    }
    setSent(true);
  }
  if (sent) return (
    <div className="page book-page">
      <div className="book-card">
        <div className="success">
          <div className="check">✓</div>
          <h2 style={{fontFamily:'var(--font-display)',letterSpacing:3,marginBottom:10}}>Успешно записване!</h2>
          <p style={{color:'rgba(255,255,255,0.6)',marginBottom:24}}>Ще се свържем с вас скоро за потвърждение.</p>
          <button className="sub-btn" onClick={() => { setSent(false); setPage('home'); window.scrollTo(0,0); }}>Към началото</button>
        </div>
      </div>
    </div>
  );
  return (
    <div className="page book-page">
      <div className="book-card">
        <h2>Запиши час</h2>
        <div className="fgrid">
          <div className="frow">
            <label>Име *</label>
            <input value={f.firstName} onChange={e => upd('firstName',e.target.value)} placeholder="Иван"/>
          </div>
          <div className="frow">
            <label>Фамилия</label>
            <input value={f.lastName} onChange={e => upd('lastName',e.target.value)} placeholder="Иванов"/>
          </div>
        </div>
        <div className="frow">
          <label>Номер на автомобила</label>
          <input value={f.plate} onChange={e => upd('plate',e.target.value.toUpperCase())} style={{textTransform:'uppercase'}} placeholder="СА 1234 АБ"/>
        </div>
        <div className="fgrid">
          <div className="frow">
            <label>Email *</label>
            <input type="email" value={f.email} onChange={e => upd('email',e.target.value)} placeholder="email@example.com"/>
          </div>
          <div className="frow">
            <label>Телефон</label>
            <input type="tel" value={f.phone} onChange={e => upd('phone', e.target.value.replace(/[^\d+\-\s()]/g,''))} placeholder="+359 88..."/>
          </div>
        </div>
        <div className="frow">
          <label>Услуга *</label>
          <ServiceSelect selected={f.services} onChange={arr => upd('services', arr)} />
        </div>
        <button className="sub-btn" onClick={submit}>Изпрати заявка</button>
      </div>
    </div>
  );
}

function Contact() {
  const [m, setM] = useState({ name:'', phone:'', email:'', msg:'' });
  const [sent, setSent] = useState(false);
  const [mapRef, mapCls] = useScrollAnim('gallery-anim-left');
  const [infoRef, infoCls] = useScrollAnim('gallery-anim-right');
  const [formRef, formCls] = useScrollAnim('gallery-anim');
  function submit() {
    if (!m.name || !m.email) { alert('Моля попълнете Име и Email.'); return; }
    if (!isValidEmail(m.email)) { alert('Моля въведете валиден Email адрес.'); return; }
    setSent(true);
  }
  return (
    <div className="page" style={{animation:'fadeIn 0.6s ease'}}>
      <div className="contact-hero"><h2>Контакти</h2></div>
      <div className="contact-grid">
        <div ref={mapRef} className={mapCls} style={{transitionDelay:'0.1s'}}>
          <div className="map-wrap">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d23667.04548570294!2d24.725344283606777!3d42.14213982131602!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x14acd1b09a7b7321%3A0xcea683bb97f2a9a1!2z0J_Qu9C-0LLQtNC40LjQsg!5e0!3m2!1sbg!2sbg!4v1713960368851!5m2!1sbg!2sbg"
              allowFullScreen loading="lazy" title="Карта"
            />
          </div>
        </div>
        <div ref={infoRef} className={infoCls} style={{transitionDelay:'0.25s'}}>
          <div className="cinfo">
            <h3>Намерете ни</h3>
            {[
              { icon:'fa-map-marker-alt', label:'Адрес', val:'Център, Пловдив, България' },
              { icon:'fa-phone', label:'Телефон', val:'+359 87 631 9542' },
              { icon:'fa-envelope', label:'Email', val:'auto_salon@website.com' },
            ].map(r => (
              <div className="irow" key={r.label}>
                <i className={'fas ' + r.icon}/>
                <div><strong>{r.label}</strong><br/>{r.val}</div>
              </div>
            ))}
            <div className="socials">
              {['fa-facebook-f','fa-youtube','fa-twitter','fa-google'].map(ic => (
                <a key={ic} href="#" className="soc-btn"><i className={'fab ' + ic}/></a>
              ))}
            </div>
          </div>
        </div>
      </div>
      <div ref={formRef} className={formCls} style={{transitionDelay:'0.15s'}}>
      <div className="cform-wrap">
        <h3>Изпратете съобщение</h3>
        {sent ? (
          <p style={{color:'rgba(255,255,255,0.55)'}}>✓ Изпратено! Ще се свържем с вас скоро.</p>
        ) : (
          <>
            <div className="fgrid">
              <div className="frow">
                <label>Име и фамилия *</label>
                <input value={m.name} onChange={e => setM({...m,name:e.target.value})} placeholder="Иван Иванов"/>
              </div>
              <div className="frow">
                <label>Телефон</label>
                <input type="tel" value={m.phone} onChange={e => setM({...m, phone: e.target.value.replace(/[^\d+\-\s()]/g,'')})} placeholder="+359 88..."/>
              </div>
            </div>
            <div className="frow">
              <label>Email *</label>
              <input type="email" value={m.email} onChange={e => setM({...m,email:e.target.value})} placeholder="email@example.com"/>
            </div>
            <div className="frow">
              <label>Съобщение</label>
              <textarea rows="4" value={m.msg} onChange={e => setM({...m,msg:e.target.value})} placeholder="Вашето съобщение..." style={{resize:'vertical'}}/>
            </div>
            <button className="sub-btn" onClick={submit}>Изпрати</button>
          </>
        )}
      </div>
      </div>
    </div>
  );
}

function Footer() {
  return (
    <footer>
      <p>&copy; 2024 <span>Auto Salon Bulgaria</span>. Всички права запазени.</p>
    </footer>
  );
}

function App() {
  const [page, setPage] = useState('home');
  const [preselectService, setPreselectService] = useState('');
  function goBook(service) {
    setPreselectService(service || '');
    setPage('book');
    window.scrollTo(0,0);
  }
  function renderPage() {
    if (page === 'home')    return <Home goBook={goBook}/>;
    if (page === 'about')   return <About/>;
    if (page === 'gallery') return <Gallery/>;
    if (page === 'book')    return <Book setPage={setPage} preselect={preselectService}/>;
    if (page === 'contact') return <Contact/>;
    return <Home goBook={goBook}/>;
  }
  return (
    <>
      <Nav page={page} setPage={setPage}/>
      {renderPage()}
      <Footer/>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
